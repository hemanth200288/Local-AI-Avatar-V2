<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveTalking AI Avatar Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --background-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --border-radius: 12px;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .main-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Video Section */
        .video-section {
            flex: 1;
            position: relative;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 125%; /* 100% / 0.8 = 125% to make the top 80% fill the height */
            object-fit: cover;
            object-position: top; /* Keep the top of the video aligned */
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Chat Section */
        .chat-section {
            width: 400px;
            background-color: var(--card-bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #444;
            padding: 20px;
        }

        .asr-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: rgba(0,0,0,0.2);
            border-radius: var(--border-radius);
            margin-bottom: 20px;
        }

        .asr-text {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .user-message {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
            margin-left: 20%;
        }

        .system-message {
            background-color: #444;
            color: #eee;
            align-self: flex-start;
            margin-right: 20%;
        }

        .controls-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-connected { background-color: #28a745; }
        .status-disconnected { background-color: #dc3545; }
        .status-connecting { background-color: #ffc107; }

        .voice-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .voice-record-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .voice-record-btn:active { transform: scale(0.9); }

        .recording-pulse { animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        textarea.form-control {
            background-color: #1a1a1a;
            border-color: #444;
            color: white;
            resize: none;
        }

        textarea.form-control:focus {
            background-color: #1a1a1a;
            color: white;
            border-color: var(--primary-color);
            box-shadow: none;
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- Video Section -->
        <div class="video-section">
            <div class="controls-overlay">
                <div class="status-badge">
                    <span class="status-indicator status-disconnected" id="connection-status"></span>
                    <span id="status-text">Disconnected</span>
                </div>
                <button class="btn btn-sm btn-dark opacity-75" onclick="location.href='admin.html'">
                    <i class="bi bi-speedometer2"></i>
                </button>
            </div>
            
            <video id="video" autoplay playsinline></video>
            <audio id="audio" autoplay style="display: none;"></audio>
            
            <div class="recording-indicator" id="recording-indicator" style="position: absolute; top: 20px; right: 20px;">
                <div class="blink"></div>
                <span>Recording</span>
            </div>
        </div>

        <!-- Chat Section -->
        <div class="chat-section">
            <h5 class="mb-3"><i class="bi bi-chat-dots-fill me-2"></i> AI Chat</h5>
            
            <div class="asr-container" id="chat-messages">
                <div class="asr-text system-message">
                    Connecting to AI Avatar...
                </div>
            </div>

            <form id="chat-form" class="mb-3">
                <div class="input-group">
                    <textarea class="form-control" id="chat-message" rows="2" placeholder="Send a message..."></textarea>
                    <button class="btn btn-primary px-3" type="submit">
                        <i class="bi bi-send"></i>
                    </button>
                </div>
            </form>

            <div class="voice-controls">
                <div class="d-flex gap-3">
                    <div class="voice-record-btn" id="voice-record-btn" title="Click to talk">
                        <i class="bi bi-mic-fill"></i>
                    </div>
                    <div class="voice-record-btn bg-danger" id="interrupt-btn" title="Interrupt">
                        <i class="bi bi-stop-circle-fill"></i>
                    </div>
                </div>
                <small class="text-muted" id="voice-record-label">Click mic to start talking</small>
            </div>
        </div>
    </div>

    <!-- Hidden elements for compatibility -->
    <div style="display: none;">
        <button id="start"></button>
        <button id="stop"></button>
        <input type="checkbox" id="use-stun">
        <input type="hidden" id="sessionid" value="0">
    </div>


    <script src="client.js"></script>
    <script src="srs.sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // Auto-start connection on page load
            setTimeout(function() {
                console.log("Auto-starting connection...");
                updateConnectionStatus('connecting');
                start();
                
                // Timer to check if video stream is loaded
                let connectionCheckTimer = setInterval(function() {
                    const video = document.getElementById('video');
                    if (video.readyState >= 3 && video.videoWidth > 0) {
                        updateConnectionStatus('connected');
                        clearInterval(connectionCheckTimer);
                    }
                }, 1000);
            }, 500);

            function updateConnectionStatus(status) {
                const statusIndicator = $('#connection-status');
                const statusText = $('#status-text');
                
                statusIndicator.removeClass('status-connected status-disconnected status-connecting');
                
                switch(status) {
                    case 'connected':
                        statusIndicator.addClass('status-connected');
                        statusText.text('Connected');
                        break;
                    case 'connecting':
                        statusIndicator.addClass('status-connecting');
                        statusText.text('Connecting...');
                        break;
                    case 'disconnected':
                    default:
                        statusIndicator.addClass('status-disconnected');
                        statusText.text('Disconnected');
                        break;
                }
            }

            // Add chat message
            function addChatMessage(message, type = 'user') {
                const messagesContainer = $('#chat-messages');
                const messageClass = type === 'user' ? 'user-message' : 'system-message';
                const sender = type === 'user' ? 'You' : 'AI Avatar';
                
                const messageElement = $(`
                    <div class="asr-text ${messageClass}">
                        ${sender}: ${message}
                    </div>
                `);
                
                messagesContainer.append(messageElement);
                messagesContainer.scrollTop(messagesContainer[0].scrollHeight);
            }

            // Start/Stop buttons
            $('#start').click(function() {
                updateConnectionStatus('connecting');
                start();
                $(this).hide();
                $('#stop').show();
                
                // Timer to check if video stream is loaded
                let connectionCheckTimer = setInterval(function() {
                    const video = document.getElementById('video');
                    // Check if video has data
                    if (video.readyState >= 3 && video.videoWidth > 0) {
                        updateConnectionStatus('connected');
                        clearInterval(connectionCheckTimer);
                    }
                }, 2000); // Check every 2 seconds
                
                // Stop checking after 60 seconds if still connecting
                setTimeout(function() {
                    if (connectionCheckTimer) {
                        clearInterval(connectionCheckTimer);
                    }
                }, 60000);
            });

            $('#stop').click(function() {
                stop();
                $(this).hide();
                $('#start').show();
                updateConnectionStatus('disconnected');
            });

            // Recording features
            $('#btn_start_record').click(function() {
                console.log('Starting recording...');
                fetch('/record', {
                    body: JSON.stringify({
                        type: 'start_record',
                        sessionid: String(document.getElementById('sessionid').value),
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                }).then(function(response) {
                    if (response.ok) {
                        console.log('Recording started.');
                        $('#btn_start_record').prop('disabled', true);
                        $('#btn_stop_record').prop('disabled', false);
                        $('#recording-indicator').addClass('active');
                    } else {
                        console.error('Failed to start recording.');
                    }
                }).catch(function(error) {
                    console.error('Error:', error);
                });
            });

            $('#btn_stop_record').click(function() {
                console.log('Stopping recording...');
                fetch('/record', {
                    body: JSON.stringify({
                        type: 'end_record',
                        sessionid: String(document.getElementById('sessionid').value),
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                }).then(function(response) {
                    if (response.ok) {
                        console.log('Recording stopped.');
                        $('#btn_start_record').prop('disabled', false);
                        $('#btn_stop_record').prop('disabled', true);
                        $('#recording-indicator').removeClass('active');
                    } else {
                        console.error('Failed to stop recording.');
                    }
                }).catch(function(error) {
                    console.error('Error:', error);
                });
            });

            $('#echo-form').on('submit', function(e) {
                e.preventDefault();
                var message = $('#message').val();
                if (!message.trim()) return;
                
                console.log('Sending echo message:', message);
                
                fetch('/human', {
                    body: JSON.stringify({
                        text: message,
                        type: 'echo',
                        interrupt: true,
                        sessionid: String(document.getElementById('sessionid').value),
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                });
                
                $('#message').val('');
                addChatMessage(`Sent read request: "${message}"`, 'system');
            });

            // Chat mode form submission
            $('#chat-form').on('submit', function(e) {
                e.preventDefault();
                var message = $('#chat-message').val();
                if (!message.trim()) return;
                
                console.log('Sending chat message:', message);
                
                fetch('/human', {
                    body: JSON.stringify({
                        text: message,
                        type: 'chat',
                        interrupt: true,
                        sessionid: String(document.getElementById('sessionid').value),
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                });
                
                addChatMessage(message, 'user');
                $('#chat-message').val('');
            });

            // Push to talk feature
            let mediaRecorder;
            let audioChunks = [];
            let isRecording = false;
            let recognition;
            
            // Check if browser supports speech recognition
            const isSpeechRecognitionSupported = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
            
            if (isSpeechRecognitionSupported) {
                recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';
                
                recognition.onresult = function(event) {
                    let interimTranscript = '';
                    let finalTranscript = '';
                    
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                            $('#chat-message').val(interimTranscript);
                        }
                    }
                    
                    if (finalTranscript) {
                        $('#chat-message').val(finalTranscript);
                    }
                };
                
                recognition.onerror = function(event) {
                    console.error('Speech recognition error:', event.error);
                };
            }
            
            // Voice Control Events
            $('#voice-record-btn').click(function() {
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });

            $('#interrupt-btn').click(function() {
                const $btn = $(this);
                $btn.css('transform', 'scale(0.9)');
                setTimeout(() => $btn.css('transform', ''), 100);
                
                console.log('Interrupting AI Avatar...');
                const sessionid = String(document.getElementById('sessionid').value);
                
                if (sessionid === '0' || !sessionid) {
                    console.warn('No active session to interrupt.');
                    addChatMessage('No active session. Please start connection first.', 'system');
                    return;
                }
                
                fetch('/interrupt_talk', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ sessionid: sessionid })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 0) {
                        console.log('Interrupt successful:', data);
                        addChatMessage('Interrupted AI Avatar', 'system');
                    } else {
                        console.error('Interrupt failed:', data.msg);
                        addChatMessage('Interrupt failed: ' + data.msg, 'system');
                    }
                })
                .catch(error => {
                    console.error('Error interrupting:', error);
                    addChatMessage('Error sending interrupt request', 'system');
                });
            });
            
            // Start recording
            function startRecording() {
                if (isRecording) return;
                
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(function(stream) {
                        audioChunks = [];
                        mediaRecorder = new MediaRecorder(stream);
                        
                        mediaRecorder.ondataavailable = function(e) {
                            if (e.data.size > 0) {
                                audioChunks.push(e.data);
                            }
                        };
                        
                        mediaRecorder.start();
                        isRecording = true;
                        
                        $('#voice-record-btn').addClass('recording-pulse');
                        $('#voice-record-btn').css('background-color', '#dc3545');
                        $('#voice-record-label').text('Recording... Click again to stop and send');
                        
                        if (recognition) {
                            recognition.start();
                        }
                    })
                    .catch(function(error) {
                        console.error('Cannot access microphone:', error);
                        let msg = 'Cannot access microphone. ';
                        if (!window.isSecureContext) {
                            msg += '\n\nNote: Browsers require HTTPS or localhost for microphone access. If you are using an IP address, please use HTTPS or access via localhost.';
                        } else {
                            msg += 'Please check browser permission settings.';
                        }
                        alert(msg);
                    });
            }

            function stopRecording() {
                if (!isRecording) return;
                
                mediaRecorder.stop();
                isRecording = false;
                
                // Stop all tracks
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                
                // Reset visual feedback
                $('#voice-record-btn').removeClass('recording-pulse');
                $('#voice-record-btn').css('background-color', '');
                $('#voice-record-label').text('Click microphone to start talking');
                
                // Stop speech recognition
                if (recognition) {
                    recognition.stop();
                }
                
                // Send audio blob to server
                mediaRecorder.onstop = function() {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const formData = new FormData();
                    formData.append('file', audioBlob, 'voice.wav');
                    formData.append('sessionid', String(document.getElementById('sessionid').value));

                    fetch('/humanaudiochat', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.code === 0) {
                            addChatMessage(data.data.text, 'user');
                        } else {
                            console.error('Server-side STT failed:', data.msg);
                        }
                    })
                    .catch(error => {
                        console.error('Error sending audio to server:', error);
                    });
                };
            }

            // WebRTC related features
            if (typeof window.onWebRTCConnected === 'function') {
                const originalOnConnected = window.onWebRTCConnected;
                window.onWebRTCConnected = function() {
                    updateConnectionStatus('connected');
                    if (originalOnConnected) originalOnConnected();
                };
            } else {
                window.onWebRTCConnected = function() {
                    updateConnectionStatus('connected');
                };
            }

            // Update status when disconnected
            if (typeof window.onWebRTCDisconnected === 'function') {
                const originalOnDisconnected = window.onWebRTCDisconnected;
                window.onWebRTCDisconnected = function() {
                    updateConnectionStatus('disconnected');
                    if (originalOnDisconnected) originalOnDisconnected();
                };
            } else {
                window.onWebRTCDisconnected = function() {
                    updateConnectionStatus('disconnected');
                };
            }

            // SRS WebRTC playback
            var sdk = null; // Global handler for cleanup on re-publishing

            function startPlay() {
                // Close previous connection
                if (sdk) {
                    sdk.close();
                }
                
                sdk = new SrsRtcWhipWhepAsync();
                $('#video').prop('srcObject', sdk.stream);
                
                var host = window.location.hostname;
                var url = "http://" + host + ":1985/rtc/v1/whep/?app=live&stream=livestream";
                
                sdk.play(url).then(function(session) {
                    console.log('WebRTC play started, Session ID:', session.sessionid);
                }).catch(function(reason) {
                    sdk.close();
                    console.error('WebRTC play failed:', reason);
                });
            }
        });
    </script>
</body>
</html>
